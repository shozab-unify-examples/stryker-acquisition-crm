name: Secrets Detection Governance Check

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    name: Secrets Detection — Gitleaks Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for secrets scanning configuration
        id: config-check
        run: |
          echo "Checking for secrets scanning configuration..."
          if [ ! -f .gitleaks.toml ] && [ ! -f .gitleaks.yaml ] && [ ! -f .github/secret_scanning.yml ]; then
            echo "config_present=false" >> $GITHUB_OUTPUT
            echo "::error title=Secrets Scanning Not Configured::No secrets scanning configuration found. All repositories must have secrets scanning enabled and passing."
          else
            echo "config_present=true" >> $GITHUB_OUTPUT
          fi

      - name: Run Gitleaks scan
        id: gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz | tar xz
          ./gitleaks detect --source . --report-format sarif --report-path gitleaks-results.sarif --exit-code 0 || true
          if [ -f gitleaks-results.sarif ]; then
            LEAK_COUNT=$(python3 -c "import json; d=json.load(open('gitleaks-results.sarif')); print(len(d.get('runs',[{}])[0].get('results',[])))" 2>/dev/null || echo "0")
            echo "leak_count=$LEAK_COUNT" >> $GITHUB_OUTPUT
          else
            echo "leak_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Generate governance SARIF finding
        if: steps.config-check.outputs.config_present == 'false'
        run: |
          cat > secrets-governance-findings.sarif << 'EOF'
          {
            "version": "2.1.0",
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "CCI Governance / Gitleaks",
                    "version": "1.0.0",
                    "rules": [
                      {
                        "id": "CCI-SEC-001",
                        "name": "SecretsScanningNotEnabled",
                        "shortDescription": { "text": "Secrets Scanning Not Enabled" },
                        "fullDescription": { "text": "Repository inherited through acquisition has no evidence of secrets scanning." },
                        "help": { "text": "Add .gitleaks.toml configuration and enable GitHub Advanced Security secret scanning. Review full commit history for exposed credentials." },
                        "properties": {
                          "tags": ["security", "secrets", "acquisition"],
                          "severity": "high",
                          "owner": "CCI Operations",
                          "policy": "Secrets Detection Required",
                          "remediationEffortHours": 16,
                          "estimatedNonComplianceCost": 125000
                        }
                      }
                    ]
                  }
                },
                "results": [
                  {
                    "ruleId": "CCI-SEC-001",
                    "level": "error",
                    "message": { "text": "Secrets scanning not enabled. Repository inherited through acquisition has no evidence of secrets scanning. Full commit history has not been audited for exposed credentials or API keys. Estimated non-compliance cost: $125,000. Remediation effort: 16 hours." },
                    "locations": [
                      {
                        "physicalLocation": {
                          "artifactLocation": { "uri": ".github", "uriBaseId": "%SRCROOT%" },
                          "region": { "startLine": 1 }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF

      - name: Upload governance SARIF
        if: steps.config-check.outputs.config_present == 'false'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: secrets-governance-findings.sarif
          category: cci-secrets-governance

      - name: Upload Gitleaks SARIF
        if: hashFiles('gitleaks-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks

      - name: Fail pipeline — secrets governance gate
        if: steps.config-check.outputs.config_present == 'false'
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║          CCI GOVERNANCE GATE FAILURE                        ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  Policy:      Secrets Detection Required                    ║"
          echo "║  Severity:    HIGH                                           ║"
          echo "║  Finding:     Secrets scanning not enabled                  ║"
          echo "║  Owner:       CCI Operations                                ║"
          echo "║  Effort:      16 hours                                      ║"
          echo "║  Cost Risk:   \$125,000                                      ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          exit 1
