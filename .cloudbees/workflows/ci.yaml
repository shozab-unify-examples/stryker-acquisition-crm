apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Acquisition CRM CI
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Mock Secrets Scan
        uses: docker://alpine:3.19
        run: |
          echo "[SCAN] Secrets scan complete — 4 findings (CRITICAL: Salesforce credentials, MongoDB URL)"
      - name: Mock SAST Scan
        uses: docker://alpine:3.19
        run: |
          echo "[SCAN] SAST scan complete — 2 findings (HIGH)"
      - name: Publish Security Evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            ## Security Scan Results — Acquisition CRM
            | Scanner | Findings | Severity |
            |---------|----------|----------|
            | Secrets | 4 | CRITICAL |
            | SAST | 2 | HIGH |

            **Secrets Governance**: OPEN — Salesforce credentials and MongoDB URL hardcoded in src/salesforce_sync.js (CCI-SEC-001)
            **Context**: Pre-acquisition — no secrets policy was enforced before Stryker acquisition
            **SLA Status**: OVERDUE — breach of 7-day critical SLA
          format: MARKDOWN

  build:
    needs:
      - scan
    outputs:
      artifact-id: ${{ steps.register-artifact.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Build
        uses: docker://alpine:3.19
        run: |
          echo "Building acquisition-crm v1.4.${{ cloudbees.run_number }}"
      - name: Register build artifact
        id: register-artifact
        uses: cloudbees-io/register-build-artifact@v2
        with:
          name: acquisition-crm
          version: 1.4.${{ cloudbees.run_number }}
          url: https://github.com/shozab-unify-examples/stryker-acquisition-crm
      - name: Publish Build Evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            ## Build — Acquisition CRM v1.4.${{ cloudbees.run_number }}
            - **Classification**: MEDIUM | acquisition | first-60-days | non-osep
            - **Owner**: Commercial BU (acquired)
          format: MARKDOWN

  deploy-dev:
    needs:
      - build
    steps:
      - name: Deploy to Dev
        uses: docker://alpine:3.19
        run: |
          echo "Deployed acquisition-crm v1.4.${{ cloudbees.run_number }} to DEV"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          name: acquisition-crm
          version: 1.4.${{ cloudbees.run_number }}
          environment-name: stryker-dev
          url: https://github.com/shozab-unify-examples/stryker-acquisition-crm

  deploy-prod:
    needs:
      - build
      - deploy-dev
    steps:
      - name: Deploy to Production
        uses: docker://alpine:3.19
        run: |
          echo "Deployed acquisition-crm v1.4.${{ cloudbees.run_number }} to PRODUCTION"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          name: acquisition-crm
          version: 1.4.${{ cloudbees.run_number }}
          environment-name: stryker-prod
          url: https://github.com/shozab-unify-examples/stryker-acquisition-crm
